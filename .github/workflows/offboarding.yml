on:
  repository_dispatch:
    types: [offboarding]
  push:
    paths:
      - 'incoming/**/*.csv'
    branches:
      - main
  workflow_dispatch:

jobs:
  process-offboarding:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create file from dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          mkdir -p incoming
          echo "${{ github.event.client_payload.contentBase64 }}" | base64 -d > "incoming/${{ github.event.client_payload.fileName }}"
        shell: bash
